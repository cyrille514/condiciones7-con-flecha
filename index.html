<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

 @layer base {
    
      button {
        @apply rounded-md bg-slate-200 border-1 border-green-400  px-4 py-1 my-5 mx-5 text-sm cursor-pointer disabled:opacity-50
      }

    }
    
  </style>

    <title>Multiplos</title>
    
</head>
<body class=" bg-black  flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md mx-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Verificador de Múltiplos</h1>
        
        <div class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Dividendo:</label>
                <input type="number" id="dividendo" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Divisor (Entre 2 y 7):</label>
                <input type="number" id="divisor" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <button id="btnCalcular" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors cursor-pointer">
                Comprobar
            </button>
        </div>

        <div id="resultado" class="mt-6 text-center font-medium hidden p-3 rounded-lg"></div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
